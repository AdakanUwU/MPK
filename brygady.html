<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brygady — Labia ↔ Termini</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #555; }
  .leg-box { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .chart-scroll { overflow-x: auto; }
  .chart-inner { min-width: 900px; }
  .hour-mark { position: absolute; font-size: 11px; color: #999; transform: translateX(-50%); }
  .brigade-row { display: flex; align-items: center; margin-bottom: 5px; }
  .brigade-label { width: 32px; font-size: 11px; font-weight: 500; color: #888; flex-shrink: 0; }
  .timeline-wrap { position: relative; flex: 1; height: 20px; }
  .segment {
    position: absolute; height: 16px; top: 2px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500; overflow: hidden; white-space: nowrap;
    cursor: pointer; transition: opacity 0.1s;
  }
  .segment:hover { opacity: 0.75; }
  .seg-bg  { background: #ebebeb; border: 0.5px solid #ddd; }
  .seg-lab { background: #378ADD; color: #d6eaf8; }
  .seg-ter { background: #1D9E75; color: #d0f0e5; }
  .tooltip {
    position: fixed; background: #fff; border: 0.5px solid #ccc;
    border-radius: 6px; padding: 6px 11px; font-size: 12px;
    pointer-events: none; z-index: 1000; display: none; color: #222;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .summary { margin-top: 14px; font-size: 12px; color: #888; }
  @media (prefers-color-scheme: dark) {
    body { background: #181818; color: #e8e8e8; }
    h1 { color: #e8e8e8; }
    .subtitle, .leg-item, .summary { color: #888; }
    .seg-bg { background: #2a2a2a; border-color: #333; }
    .tooltip { background: #222; border-color: #444; color: #eee; }
    .hour-mark { color: #555; }
    .brigade-label { color: #555; }
  }
</style>
</head>
<body>

<h1>Brygady — Labia ↔ Termini</h1>
<p class="subtitle">Kurs Labia → Termini: 47 min &nbsp;·&nbsp; Termini → Labia: 43 min &nbsp;·&nbsp; Najedź na kurs, aby zobaczyć szczegóły</p>

<div class="legend">
  <div class="leg-item"><div class="leg-box" style="background:#378ADD;"></div> Labia → Termini (47 min)</div>
  <div class="leg-item"><div class="leg-box" style="background:#1D9E75;"></div> Termini → Labia (43 min)</div>
  <div class="leg-item"><div class="leg-box" style="background:#ebebeb;border:0.5px solid #ddd;"></div> Postój</div>
</div>

<div class="chart-scroll">
  <div class="chart-inner" id="chart"></div>
</div>
<div class="summary" id="summary"></div>
<div class="tooltip" id="tip"></div>

<script>
const LABIA_DEP = [
  [5,30],[5,38],[5,46],[5,54],
  [6,2],[6,10],[6,18],[6,25],[6,32],[6,39],[6,46],[6,53],
  [7,0],[7,6],[7,12],[7,18],[7,24],[7,30],[7,36],[7,42],[7,48],[7,54],
  [8,0],[8,6],[8,12],[8,18],[8,24],[8,30],[8,36],[8,42],[8,49],[8,55],
  [9,1],[9,7],[9,13],[9,20],[9,27],[9,34],[9,41],[9,48],[9,55],
  [10,2],[10,9],[10,16],[10,23],[10,30],[10,37],[10,44],[10,51],[10,58],
  [11,4],[11,11],[11,18],[11,25],[11,32],[11,39],[11,45],[11,51],[11,58],
  [12,5],[12,12],[12,19],[12,26],[12,33],[12,40],[12,46],[12,53],
  [13,0],[13,7],[13,14],[13,21],[13,27],[13,33],[13,40],[13,47],[13,54],
  [14,1],[14,8],[14,15],[14,21],[14,27],[14,34],[14,41],[14,48],[14,55],
  [15,2],[15,8],[15,14],[15,21],[15,28],[15,34],[15,40],[15,46],[15,52],[15,58],
  [16,4],[16,10],[16,17],[16,24],[16,30],[16,36],[16,42],[16,48],[16,55],
  [17,2],[17,9],[17,16],[17,23],[17,29],[17,35],[17,41],[17,47],[17,53],
  [18,0],[18,7],[18,14],[18,21],[18,28],[18,34],[18,40],[18,47],[18,54],
  [19,1],[19,8],[19,15],[19,21],[19,27],[19,33],[19,39],[19,47],[19,55],
  [20,3],[20,11],[20,19],[20,21],[20,24],[20,27],[20,35],[20,43],[20,51],[20,59],
  [21,10],[21,21],[21,32],[21,43],[21,47],[21,54],
  [22,5],[22,16],[22,27],[22,39],[22,50],
  [23,1],[23,12],[23,24],[23,36],[23,48],
  [0,0]
];

const TERMINI_DEP = [
  [5,30],[5,38],[5,45],[5,52],[5,59],
  [6,6],[6,13],[6,21],[6,29],[6,37],[6,45],[6,53],
  [7,1],[7,7],[7,13],[7,19],[7,25],[7,31],[7,37],[7,43],[7,49],[7,55],
  [8,1],[8,7],[8,13],[8,19],[8,25],[8,31],[8,38],[8,45],[8,52],[8,59],
  [9,6],[9,13],[9,20],[9,27],[9,34],[9,41],[9,48],[9,55],
  [10,2],[10,8],[10,14],[10,21],[10,28],[10,35],[10,42],[10,49],[10,55],
  [11,1],[11,8],[11,15],[11,22],[11,29],[11,36],[11,43],[11,50],[11,56],
  [12,3],[12,10],[12,17],[12,24],[12,31],[12,37],[12,43],[12,50],[12,57],
  [13,4],[13,11],[13,18],[13,25],[13,31],[13,37],[13,44],[13,51],[13,58],
  [14,5],[14,12],[14,18],[14,24],[14,31],[14,38],[14,45],[14,52],[14,59],
  [15,6],[15,12],[15,18],[15,25],[15,31],[15,37],[15,43],[15,49],[15,55],
  [16,2],[16,9],[16,16],[16,23],[16,30],[16,36],[16,42],[16,48],[16,54],
  [17,0],[17,6],[17,13],[17,20],[17,26],[17,32],[17,38],[17,44],[17,51],[17,58],
  [18,5],[18,12],[18,19],[18,25],[18,31],[18,37],[18,43],[18,49],[18,55],
  [19,1],[19,7],[19,13],[19,19],[19,25],[19,31],[19,38],[19,46],[19,54],
  [20,2],[20,10],[20,18],[20,26],[20,34],[20,42],[20,50],[20,58],
  [21,9],[21,20],[21,31],[21,43],[21,55],
  [22,6],[22,17],[22,28],[22,39],[22,50],
  [23,1],[23,12],[23,24],[23,36],[23,48],
  [0,0]
];

function toMin(h, m) { return h * 60 + m; }
function fmtTime(min) {
  if (min >= 1440) min -= 1440;
  return String(Math.floor(min/60)).padStart(2,'0') + ':' + String(min%60).padStart(2,'0');
}

const labMin = LABIA_DEP.map(([h,m]) => toMin(h,m));
const terMin = TERMINI_DEP.map(([h,m]) => toMin(h,m));
const TRAVEL_L = 47, TRAVEL_T = 43;
const START = 5*60, END = 24*60+10, TOTAL = END - START;
const WAIT_TOL = 8;

function buildBrigades() {
  const labUsed = new Array(labMin.length).fill(false);
  const terUsed = new Array(terMin.length).fill(false);
  const brigades = [];

  while (true) {
    const firstL = labUsed.findIndex(u => !u);
    const firstT = terUsed.findIndex(u => !u);
    if (firstL === -1 && firstT === -1) break;

    const lTime = firstL !== -1 ? labMin[firstL] : Infinity;
    const tTime = firstT !== -1 ? terMin[firstT] : Infinity;

    const brigade = [];

    if (lTime <= tTime) {
      // Brygada startuje z Labii
      labUsed[firstL] = true;
      let arrTer = labMin[firstL] + TRAVEL_L;
      brigade.push({ type:'L>T', dep:labMin[firstL], arr:arrTer });

      let maxIter = 40;
      while (maxIter-- > 0) {
        const nTer = terMin.findIndex((t,i) => !terUsed[i] && t >= arrTer && t <= arrTer + WAIT_TOL);
        if (nTer === -1) break;
        terUsed[nTer] = true;
        const tDep = terMin[nTer], tArr = tDep + TRAVEL_T;
        brigade.push({ type:'T>L', dep:tDep, arr:tArr, wait:tDep - arrTer });

        const nLab = labMin.findIndex((t,i) => !labUsed[i] && t >= tArr && t <= tArr + WAIT_TOL);
        if (nLab === -1) break;
        labUsed[nLab] = true;
        const lDep = labMin[nLab], lArr = lDep + TRAVEL_L;
        brigade.push({ type:'L>T', dep:lDep, arr:lArr, wait:lDep - tArr });
        arrTer = lArr;
      }
    } else {
      // Brygada startuje z Termini
      terUsed[firstT] = true;
      let arrLab = terMin[firstT] + TRAVEL_T;
      brigade.push({ type:'T>L', dep:terMin[firstT], arr:arrLab });

      let maxIter = 40;
      while (maxIter-- > 0) {
        const nLab = labMin.findIndex((t,i) => !labUsed[i] && t >= arrLab && t <= arrLab + WAIT_TOL);
        if (nLab === -1) break;
        labUsed[nLab] = true;
        const lDep = labMin[nLab], lArr = lDep + TRAVEL_L;
        brigade.push({ type:'L>T', dep:lDep, arr:lArr, wait:lDep - arrLab });

        const nTer = terMin.findIndex((t,i) => !terUsed[i] && t >= lArr && t <= lArr + WAIT_TOL);
        if (nTer === -1) break;
        terUsed[nTer] = true;
        const tDep = terMin[nTer], tArr = tDep + TRAVEL_T;
        brigade.push({ type:'T>L', dep:tDep, arr:tArr, wait:tDep - lArr });
        arrLab = tArr;
      }
    }

    brigades.push(brigade);
  }
  return brigades;
}

const brigades = buildBrigades();
const chart = document.getElementById('chart');
const tip = document.getElementById('tip');

// Oś godzin
const axisRow = document.createElement('div');
axisRow.style.cssText = 'margin-left:36px;position:relative;height:18px;margin-bottom:4px;';
for (let h = 5; h <= 24; h++) {
  const pct = ((h*60 - START) / TOTAL) * 100;
  const sp = document.createElement('span');
  sp.className = 'hour-mark';
  sp.textContent = h === 24 ? '0' : h;
  sp.style.left = pct + '%';
  axisRow.appendChild(sp);
}
chart.appendChild(axisRow);

// Linie siatki
const gridBase = document.createElement('div');
gridBase.style.cssText = 'position:relative;margin-left:36px;';
const gridH = brigades.length * 25;
for (let h = 5; h <= 24; h++) {
  const line = document.createElement('div');
  line.style.cssText = `position:absolute;left:${((h*60-START)/TOTAL*100)}%;top:0;width:0.5px;height:${gridH}px;background:#e0e0e0;`;
  gridBase.appendChild(line);
}
chart.appendChild(gridBase);

// Wiersze brygad
brigades.forEach((br, bi) => {
  const row = document.createElement('div');
  row.className = 'brigade-row';

  const lbl = document.createElement('div');
  lbl.className = 'brigade-label';
  lbl.textContent = 'B' + (bi+1);
  row.appendChild(lbl);

  const wrap = document.createElement('div');
  wrap.className = 'timeline-wrap';

  const allMin = br.flatMap(s => [s.dep, s.arr]);
  const brigStart = Math.min(...allMin);
  const brigEnd = Math.max(...allMin);

  const bg = document.createElement('div');
  bg.className = 'segment seg-bg';
  bg.style.left = ((brigStart-START)/TOTAL*100) + '%';
  bg.style.width = ((brigEnd-brigStart)/TOTAL*100) + '%';
  wrap.appendChild(bg);

  br.forEach(seg => {
    const div = document.createElement('div');
    div.className = 'segment ' + (seg.type==='L>T' ? 'seg-lab' : 'seg-ter');
    const l = ((seg.dep-START)/TOTAL*100);
    const w = ((seg.arr-seg.dep)/TOTAL*100);
    div.style.left = l + '%';
    div.style.width = w + '%';
    if (w > 2.2) div.textContent = seg.type==='L>T' ? 'L→T' : 'T→L';

    div.addEventListener('mousemove', e => {
      tip.style.display = 'block';
      tip.style.left = (e.clientX+14) + 'px';
      tip.style.top = (e.clientY-30) + 'px';
      const waitStr = (seg.wait > 0) ? ` · postój ${seg.wait} min` : '';
      tip.textContent = `B${bi+1} · ${seg.type==='L>T'?'Labia → Termini':'Termini → Labia'}: ${fmtTime(seg.dep)} → ${fmtTime(seg.arr)}${waitStr}`;
    });
    div.addEventListener('mouseleave', () => tip.style.display='none');
    wrap.appendChild(div);
  });

  row.appendChild(wrap);
  chart.appendChild(row);
});

document.getElementById('summary').textContent =
  `Obliczono ${brigades.length} brygad (część startuje z Termini, część z Labii). Najedź kursorem na segment, aby zobaczyć szczegóły.`;
</script>
</body>
</html>
